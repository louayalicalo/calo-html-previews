<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louay Ali — Prototypes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #faf9f6;
    --bg-elevated: #f0efe9;
    --text: #191c18;
    --text-dim: #6b6f68;
    --accent: #1f9d5c;
    --accent-dim: #dcf0e2;
    --line: rgba(25,28,24,0.1);
    --line-strong: rgba(25,28,24,0.22);
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 96px 24px 64px;
  }

  /* status bar */
  .status{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 100px;
    margin-bottom: 40px;
  }

  .dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(31,157,92,0.5);
    animation: pulse 2.2s infinite;
  }

  @keyframes pulse{
    0%   { box-shadow: 0 0 0 0 rgba(31,157,92,0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(31,157,92,0); }
    100% { box-shadow: 0 0 0 0 rgba(31,157,92,0); }
  }

  header h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(38px, 6vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
  }

  header h1 span{
    color: var(--accent);
  }

  header p{
    font-size: 16px;
    line-height: 1.6;
    color: var(--text-dim);
    max-width: 480px;
    margin: 0 0 56px;
  }

  .section-label{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .section-label::after{
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .log{
    border-top: 1px solid var(--line);
  }

  .entry{
    position: relative;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: baseline;
    gap: 18px;
    padding: 22px 4px;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    transition: padding-left 0.18s ease, border-color 0.18s ease;
  }

  .entry:hover{
    padding-left: 12px;
    border-color: var(--line-strong);
  }

  .entry:hover .entry-title{ color: var(--accent); }
  .entry:hover .arrow{ transform: translateX(2px); opacity: 1; }

  .entry-index{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    padding-top: 3px;
  }

  .entry-body{ min-width: 0; }

  .entry-title{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 4px;
    transition: color 0.18s ease;
  }

  .entry-desc{
    font-size: 14px;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.5;
  }

  .entry-meta{
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 4px;
  }

  .tag{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .tag.live{
    color: var(--accent);
    background: var(--accent-dim);
  }

  .tag.draft{
    color: var(--text-dim);
    background: var(--bg-elevated);
    border: 1px solid var(--line);
  }

  .arrow{
    color: var(--text-dim);
    opacity: 0.5;
    transition: transform 0.18s ease, opacity 0.18s ease;
    font-size: 16px;
  }

  .empty-note{
    font-size: 13px;
    color: var(--text-dim);
    padding: 22px 4px;
    font-style: italic;
  }

  footer{
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  @media (max-width: 520px){
    .entry{ grid-template-columns: 28px 1fr; }
    .entry-meta{ grid-column: 2 / 3; padding-top: 8px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="status"><span class="dot"></span>All prototypes deployed and live</div>

  <header>
    <h1>Louay Ali<span>.</span></h1>
    <p>Prototypes and working demos, for Growth Squad, Calo.</p>
  </header>

  <div class="section-label">Prototypes</div>

  <div class="log">

    <!--
      HOW TO ADD A NEW PROTOTYPE:
      1. Duplicate one <a class="entry"> block below.
      2. Update href to the filename you upload (e.g. "coupon-dashboard.html").
      3. Update the index number, title, and description.
      4. Set the tag to "live" or "draft" depending on status.
    -->

    <a class="entry" href="prototype-1.html">
      <span class="entry-index">01</span>
      <span class="entry-body">
        <p class="entry-title">Gift Card Topping Up</p>
        <p class="entry-desc">Selling Credits to B2B via Gift Cards</p>
      </span>
      <span class="entry-meta">
        <span class="tag live">Live</span>
        <span class="arrow">→</span>
      </span>
    </a>
 <!--
    <a class="entry" href="prototype-2.html">
      <span class="entry-index">02</span>
      <span class="entry-body">
        <p class="entry-title">Prototype 2</p>
        <p class="entry-desc">Replace this description once the file is live.</p>
      </span>
      <span class="entry-meta">
        <span class="tag live">Live</span>
        <span class="arrow">→</span>
      </span>
    </a>

    <a class="entry" href="prototype-3.html">
      <span class="entry-index">03</span>
      <span class="entry-body">
        <p class="entry-title">Prototype 3</p>
        <p class="entry-desc">Replace this description once the file is live.</p>
      </span>
      <span class="entry-meta">
        <span class="tag live">Live</span>
        <span class="arrow">→</span>
      </span>
    </a>
  -->
  </div>

  <footer>
    <span>Louay Ali</span>
    <span id="year"></span>
  </footer>

</div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
